name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: voxa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/voxa_test
      JWT_SECRET: test-secret-for-ci
      AI_ENGINE: template
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install backend dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Push database schema
        run: npx prisma db push --skip-generate --accept-data-loss
      - name: Run tests
        run: npx jest --coverage --passWithNoTests --forceExit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: backend/coverage/

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dist
          path: frontend/dist/

  backend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install backend dependencies
        run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Build backend
        run: npx nest build
